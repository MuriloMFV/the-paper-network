<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post · The Insights</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="post-page">

  <div class="reading-progress"></div>

  <header class="post-site-header">
    <a href="index.html" class="back-link">← The Insights</a>
    <span class="post-header-title" id="post-header-title"></span>
  </header>

  <article class="post">

    <div class="post-hero">
      <div class="post-meta-top">
        <div id="post-tags" class="card-meta"></div>
        <span id="post-date" class="card-date"></span>
      </div>
      <h1 id="post-title"></h1>
      <p id="post-desc" class="post-subtitle"></p>
      <div class="post-image-wrap">
        <img id="post-image" alt="" />
      </div>
    </div>

    <div id="post-content" class="content"></div>

    <div class="post-footer">
      <div class="footer-rule"></div>
      <a href="index.html" class="back-home">← Voltar aos ensaios</a>
    </div>

  </article>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
